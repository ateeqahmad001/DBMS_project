{% extends 'base.html' %}
{% block title %}Add Employee - GyanPustak{% endblock %}
{% block content %}
<div class="form-container">
    <h1>➕ Add New Employee</h1>
    <form method="POST">
        <div class="form-row">
            <div class="form-group"><label>Role *</label><select name="role" required><option value="admin">Administrator</option><option value="support">Customer Support</option></select></div>
            <div class="form-group"><label>Employee ID *</label><input type="text" name="employee_id" required placeholder="Unique employee identifier"></div>
        </div>
        <div class="form-group"><label>Email *</label><input type="email" name="email" required placeholder="employee@example.com"></div>
        <div class="form-group"><label>Password * (min 6 characters)</label><input type="password" name="password" required minlength="6" placeholder="Minimum 6 characters"></div>
        <div class="form-row"><div class="form-group"><label>First Name *</label><input name="first_name" required placeholder="Letters only"></div><div class="form-group"><label>Last Name *</label><input name="last_name" required placeholder="Letters only"></div></div>
        <div class="form-row"><div class="form-group"><label>Gender</label><select name="gender"><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select></div><div class="form-group"><label>Salary (≥ 0)</label><input type="number" name="salary" step="0.01" min="0" placeholder="0.00"></div></div>
        <div class="form-group"><label>Aadhaar Number (exactly 12 digits)</label><input name="aadhaar" maxlength="12" pattern="\d{12}" placeholder="123456789012"></div>
        <div class="form-group"><label>Address</label><textarea name="address" rows="2" placeholder="Full address"></textarea></div>
        <div class="form-group"><label>Phone (exactly 10 digits)</label><input name="phone" maxlength="10" pattern="\d{10}" placeholder="9876543210"></div>
        <button type="submit" class="btn btn-primary" style="width:auto">Add Employee</button>
    </form>
</div>
{% endblock %}
