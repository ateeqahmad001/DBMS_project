{% extends 'base.html' %}
{% block title %}Log Issue - GyanPustak{% endblock %}
{% block content %}
<h1>➕ Log Technical Issue / Complaint</h1>
<div class="data-card"><div class="data-card-header"><h3>Log Technical Issue / Complaint</h3></div>
<div class="data-card-body">
<form method="POST">
    <div class="form-group"><label>Title *</label><input name="title" required placeholder="Brief summary of the issue"></div>
    <div class="form-group"><label>Category *</label>
        <select name="category"><option value="user_profile">User Profile</option><option value="products">Products</option><option value="cart">Cart</option><option value="orders">Orders</option><option value="other">Other</option></select>
    </div>
    <div class="form-group"><label>Description *</label><textarea name="description" rows="5" required placeholder="Detailed description of the issue..."></textarea></div>
    <div class="form-group"><label>Assign to Admin (optional)</label>
        <select name="assign_admin_id">
            <option value="">-- Do not assign --</option>
            {% for a in admins %}<option value="{{ a.id }}">{{ a.email }}</option>{% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary" style="width:auto">Submit</button>
</form></div></div>
{% endblock %}
