{% extends 'base.html' %}
{% block title %}Add Book - GyanPustak{% endblock %}
{% block content %}
<div class="form-container">
    <h1>📖 Add New Book</h1>
    <form method="POST">
        <div class="form-group"><label>Title * (not numeric-only)</label><input type="text" name="title" required placeholder="Book title"></div>
        <div class="form-row">
            <div class="form-group"><label>Authors *</label><input type="text" name="authors" required placeholder="Comma-separated author names"></div>
            <div class="form-group"><label>ISBN</label><input type="text" name="isbn" placeholder="e.g. 978-0-13-468599-1"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Publisher</label><input type="text" name="publisher" placeholder="Publisher name"></div>
            <div class="form-group"><label>Publication Date</label><input type="date" name="publication_date"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Edition</label><input type="text" name="edition" placeholder="e.g. 3rd Edition"></div>
            <div class="form-group"><label>Language</label><input type="text" name="language" value="English" placeholder="English"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Format</label><select name="format"><option value="paperback">Paperback</option><option value="hardcover">Hardcover</option><option value="ebook">eBook</option></select></div>
            <div class="form-group"><label>Type</label><select name="book_type"><option value="new">New</option><option value="used">Used</option></select></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Purchase Option</label><select name="purchase_option"><option value="buy">Buy</option><option value="rent">Rent</option><option value="both">Both</option></select></div>
            <div class="form-group"><label>Category *</label><select name="category_id" required>{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Buy Price (≥ 0)</label><input type="number" name="buy_price" step="0.01" min="0" placeholder="0.00"></div>
            <div class="form-group"><label>Rent Price (≥ 0)</label><input type="number" name="rent_price" step="0.01" min="0" placeholder="0.00"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Quantity (≥ 1)</label><input type="number" name="quantity" value="0" min="0" placeholder="0"></div>
            <div class="form-group"><label>Keywords</label><input type="text" name="keywords" placeholder="Comma-separated keywords"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Add Book →</button>
    </form>
</div>
{% endblock %}
