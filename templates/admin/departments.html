{% extends 'base.html' %}
{% block title %}Departments - GyanPustak{% endblock %}
{% block content %}
<h1 style="margin-bottom: 1.5rem;">🏢 Departments</h1>
<div class="form-container" style="margin-bottom:2rem;max-width:100%;">
    <h3>Add Department</h3>
    <form method="POST" action="{{ url_for('admin.add_department') }}" class="inline-form" style="display:flex;gap:0.75rem;align-items:flex-end;flex-wrap:wrap;">
        <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
            <label>Department Name *</label>
            <input type="text" name="name" placeholder="Department Name (not numeric-only)" required>
        </div>
        <div class="form-group" style="flex:1;min-width:200px;margin-bottom:0;">
            <label>University *</label>
            <select name="university_id" required>
                <option value="">Select University</option>
                {% for u in universities %}<option value="{{ u.id }}">{{ u.name }}</option>{% endfor %}
            </select>
        </div>
        <button class="btn btn-primary" style="min-height:44px;">Add</button>
    </form>
</div>

<div class="filter-bar" style="margin-bottom:1rem;">
    <label style="font-weight:500;">Filter by University:</label>
<select id="filterUni" onchange="filterDepartments()">
        <option value="">All Universities</option>
        {% for u in universities %}<option value="{{ u.name }}">{{ u.name }}</option>{% endfor %}
    </select>
</div>

<table class="table">
    <thead><tr><th>ID</th><th>Department Name</th><th>University</th><th></th></tr></thead>
    <tbody>
    {% for d in departments %}
    <tr data-university="{{ d.uni_name }}"><td>{{ d.id }}</td><td style="color:var(--text-primary);font-weight:500;">{{ d.name }}</td><td>{{ d.uni_name }}</td>
    <td><form method="POST" action="{{ url_for('admin.delete_department', dept_id=d.id) }}"><button class="btn btn-danger btn-sm">Delete</button></form></td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
{% block scripts %}
<script>
function filterDepartments() {
    var selected = document.getElementById('filterUni').value;
    document.querySelectorAll('tbody tr').forEach(function(row) {
        if (!selected || row.getAttribute('data-university') === selected) {
            row.style.display = '';
        } else {
            row.style.display = 'none';
        }
    });
}
</script>
{% endblock %}
