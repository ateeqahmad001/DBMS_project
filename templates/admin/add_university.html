{% extends "shared/dashboard_base.html" %}
{% block title %}Add University - GyanPustak{% endblock %}
{% block topbar_title %}Add University{% endblock %}
{% block sidebar %}
<a href="{{ url_for('admin.dashboard') }}" class="nav-item"><span class="nav-icon">🏠</span><span class="sidebar-text">Dashboard</span></a>
<a href="{{ url_for('admin.universities') }}" class="nav-item active"><span class="nav-icon">🏫</span><span class="sidebar-text">Universities</span></a>
{% endblock %}
{% block content %}
<a href="{{ url_for('admin.universities') }}" class="btn btn-secondary btn-sm mb-3">← Back</a>
<div class="data-card"><div class="data-card-header"><h3>Add University</h3></div><div class="data-card-body">
<form method="POST">
    <div class="form-group"><label>Name*</label><input name="name" required></div>
    <div class="form-group"><label>Address</label><input name="address"></div>
    <div class="form-row"><div class="form-group"><label>Rep First Name</label><input name="rep_first_name"></div><div class="form-group"><label>Rep Last Name</label><input name="rep_last_name"></div></div>
    <div class="form-row"><div class="form-group"><label>Rep Email</label><input type="email" name="rep_email"></div><div class="form-group"><label>Rep Phone</label><input name="rep_phone"></div></div>
    <button type="submit" class="btn btn-primary" style="width:auto">Add University</button>
</form></div></div>
{% endblock %}
